<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareCall — Sign In</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .login-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 32px rgba(0,0,0,.10);
    padding: 2.25rem 2rem;
    width: 100%;
    max-width: 360px;
  }
  .login-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    text-align: center;
    color: var(--text);
  }
  .login-error {
    background: #fdecea;
    border: 1px solid #f5c6c3;
    border-radius: var(--radius);
    color: #7b1f1a;
    font-size: .875rem;
    margin-bottom: 1rem;
    padding: .65rem .9rem;
  }
  .login-submit {
    width: 100%;
    margin-top: .25rem;
    padding: .65rem;
    font-size: .95rem;
  }
  .login-input {
    width: 100%;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: .875rem;
    padding: .55rem .75rem;
    transition: border-color .15s;
  }
  .login-input:focus {
    border-color: var(--teal);
    outline: none;
    box-shadow: 0 0 0 3px rgba(46,134,171,.12);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    <span>CareCall</span>
  </div>
</header>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">Sign In</div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input class="login-input" type="text" id="username" name="username"
               required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="login-input" type="password" id="password" name="password"
               required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary login-submit">Sign In</button>
    </form>
  </div>
</div>

</body>
</html>
